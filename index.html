  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#0b0f19;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      padding:20px;
      position:relative;
    }

    /* Background Glow */

    body::before{
      content:'';
      position:absolute;
      width:500px;
      height:500px;
      background:#229ED930;
      border-radius:50%;
      top:-200px;
      right:-150px;
      filter:blur(50px);
    }

    body::after{
      content:'';
      position:absolute;
      width:400px;
      height:400px;
      background:#229ED920;
      border-radius:50%;
      bottom:-150px;
      left:-100px;
      filter:blur(50px);
    }

    /* Main Card */

    .telegram-card{
      width:100%;
      max-width:420px;
      background:rgba(20,25,35,0.95);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:32px;
      padding:45px 30px;
      text-align:center;
      backdrop-filter:blur(20px);
      box-shadow:
      0 20px 60px rgba(0,0,0,0.5),
      0 0 40px rgba(34,158,217,0.12);
      position:relative;
      z-index:2;
    }

    .logo{
      width:150px;
      height:150px;
      border-radius:50%;
      object-fit:cover;
      border:5px solid #229ED9;
      margin-bottom:25px;
      box-shadow:
      0 0 30px rgba(34,158,217,0.4),
      0 10px 30px rgba(0,0,0,0.5);
    }

    h1{
      color:white;
      font-size:34px;
      font-weight:800;
      margin-bottom:14px;
      line-height:1.2;
    }

    .subs{
      display:inline-block;
      background:#229ED9;
      color:white;
      padding:12px 24px;
      border-radius:50px;
      font-size:20px;
      font-weight:700;
      margin-bottom:35px;
      box-shadow:0 10px 25px rgba(34,158,217,0.35);
      animation:pulse 2s infinite;
    }

    @keyframes pulse{
      0%{
        transform:scale(1);
      }
      50%{
        transform:scale(1.05);
      }
      100%{
        transform:scale(1);
      }
    }

    .join-btn{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-decoration:none;
      background:#229ED9;
      color:white;
      padding:18px;
      border-radius:18px;
      font-size:18px;
      font-weight:700;
      transition:0.3s;
      box-shadow:0 12px 30px rgba(34,158,217,0.35);
    }

    .join-btn:hover{
      transform:translateY(-4px);
      box-shadow:0 18px 40px rgba(34,158,217,0.45);
    }

    @media(max-width:480px){

      .telegram-card{
        padding:35px 22px;
      }

      .logo{
        width:130px;
        height:130px;
      }

      h1{
        font-size:28px;
      }

      .subs{
        font-size:18px;
        padding:10px 20px;
      }

      .join-btn{
        font-size:16px;
      }

    }

  </style>

</head>

<body>

  <div class="telegram-card">

    <!-- LOGO -->
    <img src="logo.jpeg" alt="MASTER KING CRICKET" class="logo">

    <!-- CHANNEL NAME -->
    <h1>MASTER KING CRICKET</h1>

    <!-- SUBSCRIBERS -->
    <div class="subs">
      🔥 24,780+ Subscribers
    </div>

    <!-- TELEGRAM BUTTON -->
    <a href="https://t.me/+YEcmrbFdy0RmYzRl"
       target="_blank"
       class="join-btn">

       JOIN TELEGRAM CHANNEL

    </a>

  </div>

</body>
